---
layout: default
---
<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%d/%m/%Y" }}{% if page.author %} · {{ page.author }}{% endif %}</p>
    {% if page.source %}<p class="post-source">Artigo original: <a href="{{ page.source }}" target="_blank" rel="noopener">{{ page.source }}</a></p>{% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <a href="{{ '/' | relative_url }}" class="back-link">← Voltar para a lista</a>
</article>
